<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact | Bengkel Pak Yono</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <header>
    <div class="container nav">
      <div class="brand">
        <div class="logo"><span>BY</span></div>
        <span>Bengkel Pak Yono</span>
      </div>
      <nav class="menu" id="menu">
        <a data-nav href="index.html">About</a>
        <a data-nav href="services.html">Services</a>
        <a data-nav href="collection.html">Collection</a>
        <a data-nav href="contact.html">Contact</a>
        <a class="cta" href="https://wa.me/6281234567890?text=Halo%20Pak%20Yono%2C%20saya%20ingin%20konsultasi%20servis" target="_blank" rel="noopener">
          <i class="fa-brands fa-whatsapp"></i> Konsultasi
        </a>
      </nav>
      <button class="burger" id="burger" aria-label="Menu"><i class="fa-solid fa-bars"></i></button>
    </div>
  </header>

  <main>
    <section>
      <div class="container">
        <h1 class="section-title">Contact</h1>
        <p class="section-sub">Konsultasi via WhatsApp dan ikuti media sosial kami.</p>
        <div class="contacts" style="margin-top:10px">
          <a class="icon-btn" href="https://wa.me/6281234567890?text=Halo%20Pak%20Yono%2C%20saya%20ingin%20konsultasi" target="_blank" rel="noopener"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
          <a class="icon-btn" href="#" target="_blank" rel="noopener"><i class="fa-brands fa-instagram"></i> Instagram</a>
          <a class="icon-btn" href="#" target="_blank" rel="noopener"><i class="fa-brands fa-facebook"></i> Facebook</a>
          <a class="icon-btn" href="#" target="_blank" rel="noopener"><i class="fa-brands fa-tiktok"></i> TikTok</a>
          <a class="icon-btn" href="#" target="_blank" rel="noopener"><i class="fa-brands fa-youtube"></i> YouTube</a>
          <a class="icon-btn" href="mailto:contact@bengkelpakyono.local"><i class="fa-solid fa-envelope"></i> Email</a>
        </div>
        <div class="form-card">
          <div style="font-weight:800;font-size:18px;margin-bottom:8px">Form Konsultasi</div>
          <form id="consultForm">
            <div class="fields">
              <div class="field">
                <label for="nama">Nama</label>
                <input id="nama" name="nama" type="text" placeholder="Nama lengkap" required>
              </div>
              <div class="field">
                <label for="alamat">Alamat</label>
                <input id="alamat" name="alamat" type="text" placeholder="Alamat" required>
              </div>
              <div class="field field-full">
                <label for="konsultasi">Konsultasi</label>
                <textarea id="konsultasi" name="konsultasi" placeholder="Tuliskan keluhan / kebutuhan servis" required></textarea>
              </div>
            </div>
            <div class="actions">
              <button type="submit" class="btn btn-primary"><i class="fa-brands fa-whatsapp"></i> Kirim via WhatsApp</button>
              <button type="reset" class="btn btn-secondary">Reset</button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container" style="display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap">
      <div class="muted">© <span id="year"></span> Bengkel Pak Yono. Semua hak dilindungi.</div>
      <div class="badges">
        <div class="badge"><i class="fa-solid fa-location-dot"></i> Lokasi: -</div>
        <div class="badge"><i class="fa-solid fa-link"></i> Linkbio: <a href="https://linkbio.co/Bengkelpakyono" target="_blank" rel="noopener">Bengkel Pak Yono</a></div>
      </div>
    </div>
  </footer>
  <script src="assets/js/main.js" defer></script>
</body>
</html>
